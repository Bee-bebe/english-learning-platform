<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Everyday Learning</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background: #f8f9fa;
            margin: 0;
            padding: 20px;
            color: #2d3436;
        }
        .container { max-width: 1100px; margin: auto; }
        h1 { 
            text-align: center; 
            color: #0984e3; 
            margin-bottom: 8px; 
        }
        .subtitle { 
            text-align: center; 
            color: #636e72; 
            margin-bottom: 30px; 
            font-size: 18px;
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 30px;
        }
        .tab-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 30px;
            background: white;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            cursor: pointer;
            font-size: 15.5px;
        }
        .tab-btn.active {
            background: #0984e3;
            color: white;
        }

        .search-bar {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #ddd;
            border-radius: 50px;
            font-size: 16px;
            margin-bottom: 25px;
        }

        .card {
            background: white;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        .speaker {
            float: right;
            background: #00b894;
            color: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 22px;
            cursor: pointer;
        }
        .title { font-size: 20px; font-weight: 600; margin-bottom: 12px; }
        .en { font-size: 17px; line-height: 1.8; margin: 12px 0; }
        .thai { 
            font-size: 16.5px; 
            color: #d63031; 
            background: #fff0f0; 
            padding: 15px; 
            border-radius: 10px; 
            border-left: 5px solid #ff7675;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🌟 English Everyday Learning</h1>
    <p class="subtitle">ฝึกภาษาอังกฤษผ่านเรื่องสั้น คำศัพท์ วลี และโครงสร้างประโยค</p>

    <div class="tabs" id="tabs"></div>
    <input type="text" id="search" class="search-bar" placeholder="🔍 ค้นหาเรื่องสั้น, คำศัพท์, วลี..." onkeyup="filterContent()">

    <div id="content"></div>
</div>

<script>
    const urls = {
        "Stories": "https://docs.google.com/spreadsheets/d/e/2PACX-1vRC3Mh7YMiHlA145Dr7tUsr_e-bo9gsyL60DYHXUzvh7n5Gng_6E6W9UPRhV01euSohOG1NknBLYmYn/pub?gid=0&single=true&output=csv",
        "Vocab": "https://docs.google.com/spreadsheets/d/e/2PACX-1vRC3Mh7YMiHlA145Dr7tUsr_e-bo9gsyL60DYHXUzvh7n5Gng_6E6W9UPRhV01euSohOG1NknBLYmYn/pub?gid=1638386507&single=true&output=csv",
        "Phrases": "https://docs.google.com/spreadsheets/d/e/2PACX-1vRC3Mh7YMiHlA145Dr7tUsr_e-bo9gsyL60DYHXUzvh7n5Gng_6E6W9UPRhV01euSohOG1NknBLYmYn/pub?gid=1984904840&single=true&output=csv",
        "Verbs": "https://docs.google.com/spreadsheets/d/e/2PACX-1vRC3Mh7YMiHlA145Dr7tUsr_e-bo9gsyL60DYHXUzvh7n5Gng_6E6W9UPRhV01euSohOG1NknBLYmYn/pub?gid=365591265&single=true&output=csv",
        "Structures": "https://docs.google.com/spreadsheets/d/e/2PACX-1vRC3Mh7YMiHlA145Dr7tUsr_e-bo9gsyL60DYHXUzvh7n5Gng_6E6W9UPRhV01euSohOG1NknBLYmYn/pub?gid=1448912986&single=true&output=csv",
        "VocabType": "https://docs.google.com/spreadsheets/d/e/2PACX-1vRC3Mh7YMiHlA145Dr7tUsr_e-bo9gsyL60DYHXUzvh7n5Gng_6E6W9UPRhV01euSohOG1NknBLYmYn/pub?gid=680759125&single=true&output=csv"
    };

    let currentData = [];
    let currentTab = "Stories";

    async function loadSheet(key) {
        const res = await fetch(urls[key]);
        const text = await res.text();
        const rows = text.split('\n').map(line => line.split(',').map(cell => cell.trim().replace(/^"|"$/g, '')));
        const headers = rows[0];
        currentData = rows.slice(1).map(row => {
            let obj = {};
            headers.forEach((h, i) => obj[h] = row[i] || '');
            return obj;
        });
        renderContent();
    }

    function createTabs() {
        const container = document.getElementById('tabs');
        container.innerHTML = Object.keys(urls).map(key => `
            <button class="tab-btn ${key === currentTab ? 'active' : ''}" onclick="switchTab('${key}')">
                ${key === 'Stories' ? '📖 เรื่องสั้น' : 
                  key.includes('Vocab') ? '📝 คำศัพท์' : 
                  key === 'Phrases' ? '💬 วลีสนทนา' : 
                  key === 'Verbs' ? '🗣️ กิริยา 3 ช่อง' : '📐 โครงสร้างประโยค'}
            </button>
        `).join('');
    }

    function switchTab(key) {
        currentTab = key;
        createTabs();
        loadSheet(key);
    }

    function renderContent() {
        const container = document.getElementById('content');
        let html = '';

        currentData.forEach(item => {
            const title = item.Title_EN || item.word || item.phrase || item.base || item.structure_name || 'หัวข้อ';
            const en = item.Story_EN || item.example_en || item.pattern || item.example || '';
            const th = item.Story_TH || item.thai || item.example_thai || '';

            const speakText = `${title}. ${en}. ${th}`;

            html += `
            <div class="card">
                <h3 class="title">${title} 
                    <button class="speaker" onclick="speak('${speakText.replace(/'/g, "\\'")}')">🔊</button>
                </h3>
                ${en ? `<p class="en"><strong>EN:</strong> ${en}</p>` : ''}
                ${th ? `<p class="thai"><strong>TH:</strong> ${th}</p>` : ''}
            </div>`;
        });

        container.innerHTML = html || '<p style="text-align:center; padding:60px; color:#777;">กำลังโหลดข้อมูล...</p>';
    }

    function speak(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-GB';
        utterance.rate = 0.85;
        speechSynthesis.speak(utterance);
    }

    function filterContent() {
        const term = document.getElementById('search').value.toLowerCase();
        const cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            card.style.display = card.textContent.toLowerCase().includes(term) ? '' : 'none';
        });
    }

    window.onload = () => {
        createTabs();
        loadSheet('Stories');
    };
</script>
</body>
</html>
