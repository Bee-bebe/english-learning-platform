<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>English Everyday Platform</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 5px solid #0984e3; }
        .speaker-btn { cursor: pointer; padding: 5px 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="contentDisplay">กำลังโหลดข้อมูล...</div>
    </div>
    <script>
        const sheetURLs = {
            Stories: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRC3Mh7YMiHlA145Dr7tUsr_e-bo9gsyL60DYHXUzvh7n5Gng_6E6W9UPRhV01euSohOG1NknBLYmYn/pub?gid=0&single=true&output=csv'
        };

        async function playVoice(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-GB';
            msg.rate = 0.8;
            window.speechSynthesis.speak(msg);
        }

        async function init() {
            const res = await fetch(sheetURLs.Stories);
            const csv = await res.text();
            // ดึงข้อมูลแถวที่ 2 เป็นต้นไป (ข้ามหัวข้อ)
            const rows = csv.split("\n").slice(1);
            const container = document.getElementById('contentDisplay');
            container.innerHTML = rows.map(row => {
                const cols = row.split(",");
                const text = cols.slice(1).join(" ");
                return `
                <div class="card">
                    <h3>${cols[1] || "..."} <button class="speaker-btn" onclick="playVoice('${text.replace(/'/g, "")}')">🔊 กดฟัง</button></h3>
                </div>`;
            }).join('');
        }
        init();
    </script>
</body>
</html>
