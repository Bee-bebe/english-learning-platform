<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Everyday Learning</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0984e3; --accent: #00b894; }
        body { 
            font-family: 'Sarabun', sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #e4edf5 100%); 
            padding: 20px; margin: 0; color: #2d3436;
        }
        .container { max-width: 1200px; margin: auto; }
        h1 { text-align: center; color: var(--primary); margin-bottom: 8px; }
        .subtitle { text-align: center; color: #636e72; margin-bottom: 25px; }

        .search-bar { width: 100%; padding: 16px 20px; border-radius: 50px; border: 2px solid #dfe6e9; font-size: 16px; margin-bottom: 20px; }
        .tabs { display: flex; gap: 12px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 10px; }
        .tab-btn { padding: 12px 24px; cursor: pointer; border-radius: 30px; border: none; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .tab-btn.active { background: var(--primary); color: white; }

        .card { 
            background: white; padding: 24px; margin-bottom: 20px; border-radius: 16px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        .speaker-btn { 
            cursor: pointer; background: var(--accent); color: white; border: none; 
            border-radius: 50%; width: 45px; height: 45px; font-size: 20px; float: right;
        }
        .title { font-size: 20px; font-weight: 600; margin-bottom: 12px; }
        .en { font-size: 16.8px; line-height: 1.75; }
        .thai { font-size: 16px; line-height: 1.7; color: #d63031; background: #fff5f5; padding: 12px; border-radius: 8px; margin-top: 12px; border-left: 4px solid #ff7675; }
    </style>
</head>
<body>
<div class="container">
    <h1>🌟 English Everyday Learning</h1>
    <p class="subtitle">ฝึกภาษาอังกฤษผ่านเรื่องสั้น คำศัพท์ และโครงสร้างประโยค</p>

    <div class="tabs" id="tabContainer"></div>
    <input type="text" id="searchInput" class="search-bar" placeholder="🔍 ค้นหา..." onkeyup="renderData()">

    <div style="text-align:center; margin:15px 0;">
        ความเร็วเสียง: 
        <button onclick="setSpeed(0.7)" style="padding:6px 16px;border-radius:20px;background:#0984e3;color:white;margin:0 5px;">ช้า</button>
        <button onclick="setSpeed(0.9)" style="padding:6px 16px;border-radius:20px;background:white;margin:0 5px;">ปกติ</button>
        <button onclick="setSpeed(1.2)" style="padding:6px 16px;border-radius:20px;background:white;margin:0 5px;">เร็ว</button>
    </div>

    <div id="contentDisplay"></div>
</div>

<script>
    const sheetURLs = {
        Stories: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRC3Mh7YMiHlA145Dr7tUsr_e-bo9gsyL60DYHXUzvh7n5Gng_6E6W9UPRhV01euSohOG1NknBLYmYn/pub?gid=0&single=true&output=csv',
        Vocab: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRC3Mh7YMiHlA145Dr7tUsr_e-bo9gsyL60DYHXUzvh7n5Gng_6E6W9UPRhV01euSohOG1NknBLYmYn/pub?gid=1638386507&single=true&output=csv',
        Phrases: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRC3Mh7YMiHlA145Dr7tUsr_e-bo9gsyL60DYHXUzvh7n5Gng_6E6W9UPRhV01euSohOG1NknBLYmYn/pub?gid=1984904840&single=true&output=csv',
        Verbs: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRC3Mh7YMiHlA145Dr7tUsr_e-bo9gsyL60DYHXUzvh7n5Gng_6E6W9UPRhV01euSohOG1NknBLYmYn/pub?gid=365591265&single=true&output=csv',
        Structures: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRC3Mh7YMiHlA145Dr7tUsr_e-bo9gsyL60DYHXUzvh7n5Gng_6E6W9UPRhV01euSohOG1NknBLYmYn/pub?gid=1448912986&single=true&output=csv',
        VocabType: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRC3Mh7YMiHlA145Dr7tUsr_e-bo9gsyL60DYHXUzvh7n5Gng_6E6W9UPRhV01euSohOG1NknBLYmYn/pub?gid=680759125&single=true&output=csv'
    };

    let allData = {};
    let activeTab = 'Stories';
    let currentSpeed = 0.8;

    function setSpeed(speed) { currentSpeed = speed; }

    function playVoice(text) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-GB';
        utterance.rate = currentSpeed;
        window.speechSynthesis.speak(utterance);
    }

    async function init() {
        for (const [key, url] of Object.entries(sheetURLs)) {
            try {
                const res = await fetch(url);
                const csv = await res.text();
                const rows = csv.split('\n').map(r => r.split(',').map(c => c.trim().replace(/^"|"$/g, '')));
                const headers = rows[0];
                allData[key] = rows.slice(1).filter(r => r.length > 1).map(row => {
                    let obj = {};
                    headers.forEach((h, i) => obj[h] = row[i] || '');
                    return obj;
                });
            } catch(e) { console.error("Load error", key); }
        }
        createTabs();
        renderData();
    }

    function createTabs() {
        const container = document.getElementById('tabContainer');
        container.innerHTML = Object.keys(allData).map(key => `
            <button class="tab-btn ${key === activeTab ? 'active' : ''}" data-tab="${key}" onclick="switchTab('${key}')">
                ${key === 'Stories' ? '📖 เรื่องสั้น' : 
                  key.includes('Vocab') ? '📝 คำศัพท์' : 
                  key === 'Phrases' ? '💬 วลีสนทนา' : 
                  key === 'Verbs' ? '🗣️ กิริยา 3 ช่อง' : '📐 โครงสร้างประโยค'}
            </button>
        `).join('');
    }

    function switchTab(key) {
        activeTab = key;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === key));
        renderData();
    }

    function renderData() {
        const q = document.getElementById('searchInput').value.toLowerCase().trim();
        const container = document.getElementById('contentDisplay');
        let html = '';

        const data = allData[activeTab] || [];

        data.filter(item => Object.values(item).some(v => String(v).toLowerCase().includes(q)))
            .forEach(item => {
                let title = item.Title_EN || item.word || item.phrase || item.base || item.structure_name || item['หัวข้อ'] || 'หัวข้อ';
                let en = item.Story_EN || item.example_en || item.pattern || item.example || item.phrase || item.base || '';
                let th = item.Story_TH || item.thai || item.example_thai || item['คำแปล'] || '';

                const speakText = [title, en, th].filter(Boolean).join(". ");

                html += `
                <div class="card">
                    <h3 class="title">${title}
                        <button class="speaker-btn" onclick="playVoice('${speakText.replace(/'/g, "\\'")}')">🔊</button>
                    </h3>
                    ${en ? `<p class="en"><strong>EN:</strong> ${en}</p>` : ''}
                    ${th ? `<p class="thai"><strong>TH:</strong> ${th}</p>` : ''}
                </div>`;
            });

        container.innerHTML = html || '<p style="text-align:center;padding:60px;color:#777;">ไม่พบข้อมูล กรุณาลองค้นหาใหม่</p>';
    }

    window.onload = init;
</script>
</body>
</html>
