<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Everyday Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            background: #f4f7f6; 
            padding: 20px; 
            margin: 0;
        }
        .container { max-width: 1000px; margin: auto; }
        .search-bar { 
            width: 100%; 
            padding: 15px; 
            border-radius: 25px; 
            border: 1px solid #ddd; 
            margin-bottom: 20px; 
            box-sizing: border-box;
            font-size: 16px;
        }
        .tabs { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 20px; 
            overflow-x: auto; 
            padding-bottom: 10px; 
            flex-wrap: wrap;
        }
        .tab-btn { 
            padding: 12px 20px; 
            cursor: pointer; 
            border-radius: 25px; 
            border: none; 
            background: #ddd; 
            white-space: nowrap;
            font-size: 15px;
        }
        .tab-btn.active { 
            background: #0984e3; 
            color: white; 
        }
        .card { 
            background: white; 
            padding: 20px; 
            margin-bottom: 15px; 
            border-radius: 12px; 
            border-left: 5px solid #0984e3; 
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
        }
        .speaker-btn { 
            cursor: pointer; 
            background: #0984e3; 
            color: white; 
            border: none; 
            border-radius: 50%; 
            width: 38px; 
            height: 38px; 
            margin-left: 10px; 
            font-size: 18px;
            vertical-align: middle;
        }
        .thai { 
            color: #d63031; 
            font-size: 15px; 
            margin-top: 8px; 
        }
        h3 { margin: 0 0 10px 0; }
    </style>
</head>
<body>
<div class="container">
    <h1>📚 English Everyday Learning</h1>
    <div class="tabs" id="tabContainer"></div>
    <input type="text" id="searchInput" class="search-bar" 
           placeholder="🔍 ค้นหาคำศัพท์, ประโยค, เรื่องสั้น..." 
           onkeyup="renderData()">
    <div id="contentDisplay"></div>
</div>

<script>
    const sheetURLs = {
        Stories: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRC3Mh7YMiHlA145Dr7tUsr_e-bo9gsyL60DYHXUzvh7n5Gng_6E6W9UPRhV01euSohOG1NknBLYmYn/pub?gid=0&single=true&output=csv',
        Vocab: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRC3Mh7YMiHlA145Dr7tUsr_e-bo9gsyL60DYHXUzvh7n5Gng_6E6W9UPRhV01euSohOG1NknBLYmYn/pub?gid=1638386507&single=true&output=csv',
        Phrases: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRC3Mh7YMiHlA145Dr7tUsr_e-bo9gsyL60DYHXUzvh7n5Gng_6E6W9UPRhV01euSohOG1NknBLYmYn/pub?gid=1984904840&single=true&output=csv',
        Verbs: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRC3Mh7YMiHlA145Dr7tUsr_e-bo9gsyL60DYHXUzvh7n5Gng_6E6W9UPRhV01euSohOG1NknBLYmYn/pub?gid=365591265&single=true&output=csv',
        Structures: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRC3Mh7YMiHlA145Dr7tUsr_e-bo9gsyL60DYHXUzvh7n5Gng_6E6W9UPRhV01euSohOG1NknBLYmYn/pub?gid=1448912986&single=true&output=csv',
        VocabType: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRC3Mh7YMiHlA145Dr7tUsr_e-bo9gsyL60DYHXUzvh7n5Gng_6E6W9UPRhV01euSohOG1NknBLYmYn/pub?gid=680759125&single=true&output=csv'
    };

    let allData = {};
    let activeTab = 'Stories';

    function playVoice(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'en-GB';
        msg.rate = 0.85;
        msg.pitch = 1;
        window.speechSynthesis.speak(msg);
    }

    async function init() {
        for (const [key, url] of Object.entries(sheetURLs)) {
            try {
                const res = await fetch(url);
                const csv = await res.text();
                const lines = csv.split("\n");
                const headers = lines[0].split(",").map(h => h.trim().replace(/"/g, ''));
                allData[key] = lines.slice(1).filter(line => line.trim() !== "").map(line => {
                    // แยก CSV แบบง่าย (รองรับ comma ในข้อความ)
                    const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    let obj = {};
                    headers.forEach((h, i) => {
                        obj[h] = values[i] ? values[i].trim().replace(/^"|"$/g, '') : "";
                    });
                    return obj;
                });
            } catch(e) {
                console.error(`Error loading ${key}`, e);
            }
        }
        createTabs();
        renderData();
    }

    function createTabs() {
        const container = document.getElementById('tabContainer');
        container.innerHTML = '';
        Object.keys(allData).forEach(key => {
            const btn = document.createElement('button');
            btn.className = `tab-btn ${key === activeTab ? 'active' : ''}`;
            btn.textContent = key === 'Stories' ? '📖 เรื่องสั้น' : 
                              key === 'Vocab' || key === 'VocabType' ? '📝 คำศัพท์' :
                              key === 'Phrases' ? '💬 วลีสนทนา' :
                              key === 'Verbs' ? '🗣️ กิริยา 3 ช่อง' : '📐 โครงสร้างประโยค';
            btn.onclick = () => switchTab(key);
            container.appendChild(btn);
        });
    }

    function switchTab(key) {
        activeTab = key;
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.textContent.includes(key) || btn.textContent === key);
        });
        document.getElementById('searchInput').value = "";
        renderData();
    }

    function renderData() {
        const q = document.getElementById('searchInput').value.toLowerCase().trim();
        const display = document.getElementById('contentDisplay');
        const data = allData[activeTab] || [];

        let html = '';

        data.filter(item => {
            return Object.values(item).some(val => 
                String(val).toLowerCase().includes(q)
            );
        }).forEach(item => {
            const textToSpeak = Object.values(item).slice(1, 5).join(". ");
            
            html += `
            <div class="card">
                <h3>${item.title || item.word || item.phrase || item.structure_name || 'หัวข้อ'} 
                    <button class="speaker-btn" onclick="playVoice('${textToSpeak.replace(/'/g, "\\'")}')">🔊</button>
                </h3>
                <p><strong>EN:</strong> ${item.story || item.example_en || item.pattern || item.base || item.phrase || ''}</p>
                ${item.thai || item.example_thai ? `<p class="thai"><strong>TH:</strong> ${item.thai || item.example_thai}</p>` : ''}
                ${item.past_simple ? `<p><strong>Past:</strong> ${item.past_simple} | <strong>P.P.:</strong> ${item.past_participle}</p>` : ''}
            </div>`;
        });

        display.innerHTML = html || '<p style="text-align:center; color:#666;">ไม่พบข้อมูล กรุณาลองค้นหาใหม่</p>';
    }

    // เริ่มต้น
    window.onload = init;
</script>
</body>
</html>
